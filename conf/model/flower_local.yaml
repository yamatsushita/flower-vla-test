# FLOWERVLA Local Configuration
_target_: flower.models.flower.FLOWERVLA
_recursive_: false

# VLM Configuration (Florence-2-large, auto-downloaded from HF cache)
vlm_path: microsoft/Florence-2-large
freeze_florence: False
freeze_vision_tower: False
vlm_prompt_style: default
token_dropout: 0.1

# Model Structure
multistep: ${multistep}
num_sampling_steps: 4
lowdim_obs_dim: 7
action_dim: 7
act_window_size: 10

# Pretrained FLOWER weights (downloaded from mbreuss/flower_vla_pret)
load_pretrained: True
pretrained_model_path: C:/Users/yamatsushita/Home/Projects.2025/remote_cli/w1_20260420/flower-vla-test/checkpoints/flower_pret/360000_model_weights.pt

# Model flags
use_second_view: True
second_view_key: image_wrist
action_type_adaln: True
use_causal_attention: true
use_cross_attn: True
use_adaln_cond: false
use_readout_token: false
use_proprio: false
return_act_chunk: false

# DiT Configuration
sampling_type: uniform
dit_dim: 1024
n_heads: 16
n_layers: 18
attn_pdrop: 0.1
resid_pdrop: 0.1
mlp_pdrop: 0.1

# RoPE Configuration
use_rope: true
use_nope: false
query_seq_len: 100
rope_theta: 32.0

# Optimizer Configuration
optimizer_type: adamw

optimizer:
  _target_: torch.optim.AdamW
  transformer_weight_decay: 0.05
  learning_rate: 2e-5
  betas: [0.9, 0.95]

# Learning Rate Scheduler
lr_scheduler:
  lr_scheduler:
    init_lr: 2e-5
    init_lr_scale: 0.1
    final_lr_scale: 0.5
    total_steps: 50000
    phase_ratio: "(0.05, 0.1, 0.85)"
    lr: 2e-5
