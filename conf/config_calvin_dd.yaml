defaults:
  - callbacks: calvin
  - datamodule: calvin
  - model: flower_local
  - override hydra/job_logging: colorlog
  - override hydra/hydra_logging: colorlog

# D->D training config — update root_data_dir after unzipping task_D_D.zip
root_data_dir: C:/Users/yamatsushita/Home/Projects.2025/remote_cli/w1_20260420/flower-vla-test/dataset/task_D_D
lang_folder: lang_paraphrase-MiniLM-L3-v2

log_dir: ./logs
slurm: false
seed: 42
device: 'cuda'
batch_size: 8
devices: 1
act_dim: 7
proprio_dims: 7
obs_dim: 512
goal_dim: 512
obs_seq_len: 1
act_seq_len: 10
multistep: 10
p_last_state: 0
gen_img_res: 112
max_epochs: 35
rollout_lh_skip_epochs: 999  # Windows: skip rollout (requires EGL/Linux)
num_workers: 4
benchmark_name: calvin_d
use_extracted_rel_actions: true  # requires running preprocess/extract_by_key.py first

trainer:
  devices: ${devices}
  precision: bf16-mixed
  max_epochs: ${max_epochs}
  sync_batchnorm: False
  accelerator: gpu
  strategy: "auto"
  limit_train_batches: 1000
  limit_val_batches: 4
  gradient_clip_val: 1.0

logger:
  _target_: pytorch_lightning.loggers.CSVLogger
  save_dir: ${log_dir}
  name: flower_calvin_dd

hydra:
  run:
    dir: ${log_dir}/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}_seed${seed}
  sweep:
    dir: ${log_dir}/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.override_dirname}
  job:
    config:
      override_dirname:
        exclude_keys:
          - log_dir
          - datamodule.root_data_dir
          - trainer.gpus
          - datamodule.num_workers
          - trainer.limit_train_batches
          - trainer.limit_val_batches
